<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>عهد — رف الكبسولات</title>
<meta name="description" content="منصة «عهد»: اكتب عهدك، نختمه عنك، ونعيده إليك في موعده — ومعه سجل رحلتك." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --night:#0c0f16; --night-2:#121724;
  --panel:rgba(18,23,36,.72);
  --line:rgba(148,163,184,.14);
  --text:#e9ecf4; --muted:#98a1b3;
  --gold:#c9a227; --gold-2:#e3c565; --gold-dim:rgba(201,162,39,.35);
  --paper:#f3ead7; --paper-2:#eadfc6; --ink:#2b241a; --ink-soft:#4a4132;
  --danger:#e0655a; --ok:#4fc08d;
  --radius:18px;
  --ui:"Tajawal",system-ui,sans-serif;
  --letter:"Amiri","Tajawal",serif;
}
html[data-theme="light"]{
  --night:#faf6ef; --night-2:#f2ece1;
  --panel:rgba(255,255,255,.6);
  --line:rgba(43,36,26,.14);
  --text:#241f18; --muted:#6b6255;
}
*{box-sizing:border-box}
body{
  margin:0;font-family:var(--ui);color:var(--text);line-height:1.7;
  transition:background-color .25s ease, color .25s ease;
  background:
    radial-gradient(1100px 600px at 85% -10%, rgba(201,162,39,.07), transparent 60%),
    radial-gradient(800px 500px at 0% 10%, rgba(60,80,140,.10), transparent 55%),
    var(--night);
  min-height:100vh;padding:22px 16px 70px;
}
.wrap{width:min(940px,100%);margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:26px}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:15px}
.brand .seal-dot{width:13px;height:13px;border-radius:50%;
  background:radial-gradient(circle at 32% 30%, var(--gold-2), var(--gold) 60%, #7a621a);
  box-shadow:0 0 0 5px rgba(201,162,39,.10)}
.brand b{font-family:var(--letter);font-size:20px;color:var(--text)}
.top-tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.chip{border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:700;color:var(--muted);background:rgba(18,23,36,.55)}
.home-link{
  display:inline-flex;align-items:center;gap:6px;text-decoration:none;
  border:1px solid var(--gold-dim);border-radius:999px;
  padding:6px 14px;font-size:12.5px;font-weight:800;
  color:var(--gold-2);background:rgba(201,162,39,.06);
  transition:filter .12s ease;
}
.home-link:hover{filter:brightness(1.1);background:rgba(201,162,39,.12)}
.lang-btn{border:1px solid var(--gold-dim);border-radius:999px;padding:6px 14px;font-size:12.5px;font-weight:800;
  color:var(--gold-2);background:rgba(201,162,39,.06);cursor:pointer}
.lang-btn:hover{background:rgba(201,162,39,.12)}

button{font-family:var(--ui);font-weight:800;font-size:15px;border:0;border-radius:14px;padding:12px 20px;cursor:pointer;transition:filter .12s,transform .08s}
button:hover{filter:brightness(1.08)} button:active{transform:translateY(1px)}
button:disabled{opacity:.55;cursor:not-allowed}
.btn-gold{color:#191302;background:linear-gradient(135deg,var(--gold-2),var(--gold));box-shadow:0 10px 26px rgba(201,162,39,.22)}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--gold-dim)}
.btn-sm{padding:8px 14px;font-size:13px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.actions.center{justify-content:center}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:26px 24px;backdrop-filter:blur(6px)}
h1{font-family:var(--letter);font-weight:700;font-size:30px;margin:0 0 8px;color:var(--text)}
h2{font-family:var(--letter);font-weight:700;font-size:23px;margin:0 0 8px;color:var(--text)}
.sub{color:var(--muted);font-size:14px;margin:0 0 18px}
label{display:block;font-size:13px;font-weight:800;color:var(--text);margin:14px 0 8px}
input,textarea,select{
  width:100%;font-family:var(--ui);font-size:15.5px;color:var(--text);
  background:rgba(10,13,20,.6);border:1px solid var(--line);border-radius:14px;
  padding:13px;outline:none;transition:border-color .15s,box-shadow .15s;
}
input:focus,textarea:focus,select:focus{border-color:var(--gold-dim);box-shadow:0 0 0 4px rgba(201,162,39,.10)}
textarea{min-height:96px;resize:vertical}
select{appearance:none}
.hint{font-size:12px;color:var(--muted);margin-top:7px}
.err{font-size:13px;color:var(--danger);font-weight:700;margin-top:10px;display:none}
.err.active{display:block}

.view{display:none;animation:in .45s ease both}
.view.active{display:block}
@keyframes in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* auth */
.auth-box{width:min(460px,100%);margin:0 auto}
.hero-how{width:min(760px,100%);margin:2vh auto 34px;text-align:center}
.hero-how h1{font-size:34px;line-height:1.4}
.how{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:24px 0 10px}
@media(max-width:700px){.how{grid-template-columns:1fr}}
.hs{border:1px solid var(--line);border-radius:16px;padding:18px 14px;background:var(--panel);text-align:center}
.hs .n{width:38px;height:38px;border-radius:50%;margin:0 auto 10px;display:grid;place-items:center;
  background:radial-gradient(circle at 32% 28%, #efd88a, var(--gold) 45%, #8a6f1c 85%);
  color:#241c05;font-weight:800;font-size:16px}
.hs .t{font-weight:800;color:var(--text);font-size:15px;margin-bottom:6px}
.hs .b{font-size:13px;color:var(--muted);line-height:1.8}
.tagline{font-family:var(--letter);font-size:18px;color:var(--gold-2);margin:14px 0 26px}

/* paywall */
.plans{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}
@media(max-width:700px){.plans{grid-template-columns:1fr}}
.plan{border:1px solid var(--line);border-radius:16px;padding:22px 18px;text-align:center;background:rgba(10,13,20,.4);position:relative}
.plan.best{border-color:var(--gold)}
.plan .best-tag{position:absolute;top:-12px;inset-inline-start:50%;transform:translateX(50%);
  background:var(--gold);color:#191302;font-size:11.5px;font-weight:800;border-radius:999px;padding:3px 12px}
.plan .pt{font-weight:800;color:var(--text);font-size:17px}
.plan .price{font-size:34px;font-weight:800;color:var(--gold-2);margin:8px 0 2px}
.plan .per{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:10px}
.plan .pd{font-size:13px;color:var(--muted);line-height:1.9;margin-bottom:14px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{flex:1;text-align:center;padding:10px;border-radius:12px;border:1px solid var(--line);color:var(--muted);font-weight:800;cursor:pointer;font-size:14px}
.tab.on{border-color:var(--gold);color:var(--gold-2);background:rgba(201,162,39,.08)}

/* shelf */
.shelf-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.cap{
  border:1px solid var(--line);border-radius:16px;padding:18px;cursor:pointer;
  background:linear-gradient(180deg,rgba(18,23,36,.9),rgba(13,18,30,.8));
  transition:border-color .15s, transform .12s;position:relative;overflow:hidden;
}
.cap:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
.cap .seal{
  position:absolute;top:14px;inset-inline-start:14px;width:40px;height:40px;border-radius:50%;
  background:radial-gradient(circle at 32% 28%, #efd88a, var(--gold) 45%, #8a6f1c 85%);
  display:grid;place-items:center;color:#241c05;font-weight:800;font-size:10px;
}
.cap.opened .seal{background:radial-gradient(circle at 32% 28%, #d9e6dd, #9fbfae 45%, #5c7a6a 85%)}
.cap .title{font-family:var(--letter);font-size:20px;color:var(--text);margin:0 52px 6px 0;font-weight:700}
.cap .meta{font-size:12.5px;color:var(--muted);line-height:1.9}
.cap .count{font-size:26px;font-weight:800;color:var(--gold-2);margin-top:8px}
.cap .count small{font-size:12px;color:var(--muted);font-weight:700}
.cap .ready-tag{display:inline-block;margin-top:10px;background:rgba(201,162,39,.15);border:1px solid var(--gold);color:var(--gold-2);border-radius:999px;padding:4px 12px;font-size:12px;font-weight:800}
.cap .opened-tag{display:inline-block;margin-top:10px;border:1px solid rgba(79,192,141,.5);color:#8fd8b4;border-radius:999px;padding:4px 12px;font-size:12px;font-weight:800}
.empty{border:1px dashed var(--line);border-radius:16px;padding:40px 20px;text-align:center;color:var(--muted)}

/* new capsule */
.presets{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.preset{border:1px solid var(--line);background:rgba(10,13,20,.5);color:var(--text);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer}
.preset.on{border-color:var(--gold);color:var(--gold-2);background:rgba(201,162,39,.1)}
.freq-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ms-row{display:grid;grid-template-columns:1fr 150px 42px;gap:8px;margin-bottom:8px}
.ms-row .del{border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:12px;font-size:16px;padding:0}

/* capsule detail */
.big-count{font-size:56px;font-weight:800;color:var(--gold-2);line-height:1.1}
.big-count small{display:block;font-size:14px;color:var(--muted);font-weight:700;margin-top:4px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
@media(max-width:700px){.detail-grid{grid-template-columns:1fr}.freq-row{grid-template-columns:1fr}}
.stat{border:1px solid var(--line);border-radius:14px;padding:14px;background:rgba(10,13,20,.4)}
.stat .k{font-size:12px;color:var(--muted);font-weight:700}
.stat .v{font-size:18px;font-weight:800;color:var(--text);margin-top:4px}
.voice{font-family:var(--letter);font-size:19px;line-height:2;color:var(--text);border-inline-start:3px solid var(--gold);padding-inline-start:16px;margin:16px 0}
.ms-q{border:1px solid var(--gold-dim);border-radius:14px;padding:14px;background:rgba(201,162,39,.05);margin-top:12px}
.ms-q .t{font-weight:800;color:var(--gold-2);margin-bottom:8px}
.yesno{display:flex;gap:8px;margin:8px 0}
.yesno .yn{flex:1;text-align:center;border:1px solid var(--line);border-radius:12px;padding:9px;font-weight:800;cursor:pointer;color:var(--muted);font-size:14px}
.yesno .yn.on{border-color:var(--gold);color:var(--gold-2);background:rgba(201,162,39,.1)}

/* ceremony */
.paper{
  background:linear-gradient(180deg,var(--paper),var(--paper-2));color:var(--ink);
  border-radius:6px;padding:40px clamp(20px,5vw,52px);box-shadow:0 40px 90px rgba(0,0,0,.55);
}
.paper h2{color:#1f1910}
.paper .pledge{font-family:var(--letter);font-size:22px;line-height:2.1;color:#2b241a}
.paper .sec{border-top:1px dashed rgba(74,65,50,.35);margin-top:22px;padding-top:18px}
.paper .sec-t{font-family:var(--letter);font-weight:700;font-size:17px;color:#1f1910;margin:0 0 10px}
.entry{margin-bottom:16px}
.entry .d{font-size:12px;font-weight:800;color:#8a6712}
.entry .c{font-family:var(--letter);font-size:16.5px;line-height:2;color:#2b241a}
.ms-line{font-size:14.5px;color:#2b241a;margin-bottom:8px}
.ms-line .ok{color:#2f7a53;font-weight:800}
.ms-line .no{color:#9b5a4d;font-weight:800}

.toast{position:fixed;bottom:20px;inset-inline-start:20px;background:rgba(18,23,36,.96);
  border:1px solid var(--gold-dim);color:var(--text);font-size:13.5px;font-weight:700;
  padding:11px 16px;border-radius:12px;display:none;z-index:99;box-shadow:0 14px 34px rgba(0,0,0,.4)}
.loading{opacity:.6;pointer-events:none}
a.linkless{color:var(--gold-2);text-decoration:none;font-weight:800;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand"><span class="seal-dot"></span><b>عَهْد</b><span class="chip" id="chipSub"></span></div>
    <div class="top-tools">
      <a class="home-link" href="index.html" id="homeLink"></a>
      <span class="chip" id="userEmail" style="display:none"></span>
      <button class="btn-ghost btn-sm" id="logoutBtn" type="button" style="display:none"></button>
      <button class="lang-btn" id="themeBtn" type="button"></button>
      <button class="lang-btn" id="langBtn" type="button">EN</button>
    </div>
  </div>

  <!-- ============ AUTH ============ -->
  <section class="view" id="vAuth">
    <div class="hero-how">
      <h1 id="authHeroTitle"></h1>
      <p class="sub" style="max-width:560px;margin:10px auto 0" id="authHeroSub"></p>
      <div class="how">
        <div class="hs">
          <div class="n" id="ah1n"></div>
          <div class="t" id="ah1t"></div>
          <div class="b" id="ah1b"></div>
        </div>
        <div class="hs">
          <div class="n" id="ah2n"></div>
          <div class="t" id="ah2t"></div>
          <div class="b" id="ah2b"></div>
        </div>
        <div class="hs">
          <div class="n" id="ah3n"></div>
          <div class="t" id="ah3t"></div>
          <div class="b" id="ah3b"></div>
        </div>
      </div>
      <p class="tagline" id="authTagline"></p>
    </div>
    <div class="auth-box panel">
      <h1 id="authBoxTitle"></h1>
      <p class="sub" id="authBoxSub"></p>
      <div class="tabs">
        <div class="tab on" id="tabLogin"></div>
        <div class="tab" id="tabSignup"></div>
      </div>
      <label for="authEmail" id="lblEmail"></label>
      <input id="authEmail" type="email" autocomplete="email" placeholder="you@example.com" />
      <label for="authPass" id="lblPass"></label>
      <input id="authPass" type="password" autocomplete="current-password" />
      <div class="err" id="authErr"></div>
      <div class="actions">
        <button class="btn-gold" id="authBtn" type="button"></button>
      </div>
    </div>
  </section>

  <!-- ============ SHELF ============ -->
  <section class="view" id="vShelf">
    <div class="shelf-head">
      <div>
        <h1 id="shelfTitle"></h1>
        <p class="sub" id="shelfSub"></p>
      </div>
      <button class="btn-gold" id="newCapBtn" type="button"></button>
    </div>
    <div class="grid" id="capGrid"></div>
    <div class="empty" id="shelfEmpty" style="display:none">
      <h2 style="margin-bottom:4px" id="emptyTitle"></h2>
      <p class="sub" style="margin-bottom:6px" id="emptySub"></p>
      <div class="how" style="text-align:center;margin:18px 0 6px">
        <div class="hs">
          <div class="n" id="eh1n"></div>
          <div class="t" id="eh1t"></div>
          <div class="b" id="eh1b"></div>
        </div>
        <div class="hs">
          <div class="n" id="eh2n"></div>
          <div class="t" id="eh2t"></div>
          <div class="b" id="eh2b"></div>
        </div>
        <div class="hs">
          <div class="n" id="eh3n"></div>
          <div class="t" id="eh3t"></div>
          <div class="b" id="eh3b"></div>
        </div>
      </div>
      <div class="actions center">
        <button class="btn-gold" id="firstCapBtn" type="button"></button>
      </div>
    </div>
  </section>

  <!-- ============ NEW CAPSULE ============ -->
  <section class="view" id="vNew">
    <div class="panel">
      <h2 id="ncH2"></h2>
      <p class="sub" id="ncSub"></p>

      <label id="lblFor"></label>
      <div class="presets" id="ncFor">
        <span class="preset on" data-for="self" id="ncForSelf"></span>
        <span class="preset" data-for="other" id="ncForOther"></span>
      </div>
      <div class="hint" id="ncForHint" style="margin-bottom:14px"></div>

      <div id="ncRecipientBlock" style="display:none">
        <label for="ncRecipientName" id="lblRecipName"></label>
        <input id="ncRecipientName" type="text" maxlength="60" />
        <label for="ncRecipientEmail" id="lblRecipEmail"></label>
        <input id="ncRecipientEmail" type="email" placeholder="example@email.com" />
        <div class="hint" id="recipHint"></div>
      </div>

      <label for="ncTitle" id="lblTitle"></label>
      <input id="ncTitle" type="text" maxlength="60" />

      <label for="ncPledge" id="ncPledgeLbl"></label>
      <textarea id="ncPledge"></textarea>

      <label id="lblOpenDate"></label>
      <div class="presets" id="presets">
        <span class="preset" data-d="1" id="preset1"></span>
        <span class="preset" data-d="3" id="preset2"></span>
        <span class="preset" data-m="3" id="preset3"></span>
        <span class="preset" data-m="12" id="preset4"></span>
        <span class="preset" data-m="60" id="preset5"></span>
        <span class="preset" data-m="120" id="preset6"></span>
      </div>
      <input id="ncDate" type="date" style="margin-top:10px" />
      <div class="hint" id="dateHint"></div>

      <label id="lblFreq"></label>
      <div class="freq-row">
        <select id="ncFreq">
          <option value="monthly" id="optMonthly"></option>
          <option value="weekly" id="optWeekly"></option>
          <option value="none" id="optNone"></option>
        </select>
        <select id="ncFreqDay"></select>
      </div>
      <div class="hint" id="freqHint"></div>

      <label id="lblMs"></label>
      <div id="msRows"></div>
      <button class="btn-ghost btn-sm" id="addMsBtn" type="button"></button>

      <div class="err" id="ncErr"></div>
      <div class="actions">
        <button class="btn-gold" id="sealCapBtn" type="button"></button>
        <button class="btn-ghost" id="cancelNewBtn" type="button"></button>
      </div>
    </div>
  </section>

  <!-- ============ CAPSULE DETAIL (sealed / ready) ============ -->
  <section class="view" id="vCap">
    <div class="panel" id="capPanel">
      <a class="linkless" id="backBtn"></a>
      <div style="height:8px"></div>
      <h2 id="cTitle"></h2>
      <p class="sub" id="cSealedSince"></p>

      <div id="cSealedBlock">
        <div id="firstBanner" class="ms-q" style="display:none">
          <div class="t" id="fbTitle"></div>
          <div style="font-size:13.5px;color:var(--muted);line-height:1.9" id="fbBody"></div>
        </div>
        <div class="big-count"><span id="cDays"></span><small id="cOpenDate"></small></div>

        <div class="detail-grid">
          <div class="stat"><div class="k" id="lblEntries"></div><div class="v" id="cEntries">…</div></div>
          <div class="stat"><div class="k" id="lblFreqStat"></div><div class="v" id="cFreq"></div></div>
        </div>

        <div id="cMsQs"></div>

        <div class="voice" id="voiceText"></div>
        <textarea id="cEntryText"></textarea>
        <div class="err" id="cErr"></div>
        <div class="actions">
          <button class="btn-gold" id="sealEntryBtn" type="button"></button>
        </div>
      </div>

      <div id="cReadyBlock" style="display:none;text-align:center;padding:20px 0">
        <div class="big-count" style="font-family:var(--letter)" id="readyTitle"></div>
        <p class="sub" style="margin-top:10px" id="readySub"></p>
        <div class="actions" style="justify-content:center">
          <button class="btn-gold" id="openCapBtn" type="button"></button>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ PAYWALL ============ -->
  <section class="view" id="vPay">
    <div class="panel">
      <a class="linkless" id="backBtn3"></a>
      <div style="height:8px"></div>
      <h2 id="payH2"></h2>
      <p class="sub" id="paySub"></p>

      <div class="plans" style="grid-template-columns:1fr;max-width:430px;margin:22px auto 0">
        <div class="plan best">
          <div class="best-tag" id="planBestTag"></div>
          <div class="pt" id="planTitle"></div>
          <div class="price" id="planPrice"></div>
          <div class="per" id="planPer"></div>
          <div class="pd" id="planDesc"></div>
          <button class="btn-gold" id="payAnnualBtn" type="button"></button>
        </div>
      </div>
      <div class="hint" style="margin-top:14px" id="payHint"></div>
    </div>
  </section>

  <!-- ============ CEREMONY (opened) ============ -->
  <section class="view" id="vOpen">
    <a class="linkless" id="backBtn2"></a>
    <div style="height:12px"></div>
    <div class="paper">
      <div style="font-size:12px;font-weight:800;color:#8a6712" id="oMeta"></div>
      <h2 id="oTitle" style="margin-top:8px"></h2>

      <div class="sec">
        <p class="sec-t" id="secPledgeTitle"></p>
        <p class="pledge" id="oPledge"></p>

/* =====================================================================

===================================================================== */
let authMode = "login";
$("tabLogin").onclick = ()=>setAuthMode("login");
$("tabSignup").onclick = ()=>setAuthMode("signup");
function setAuthMode(m){
  authMode=m;
  $("tabLogin").classList.toggle("on",m==="login");
  $("tabSignup").classList.toggle("on",m==="signup");
  $("authBtn").textContent = m==="login" ? S().authBtnLogin : S().authBtnSignup;
  err("authErr");
}

$("authBtn").onclick = async ()=>{
  const email = clean($("authEmail").value), pass = $("authPass").value;
  if(!email || pass.length < 8){ err("authErr", S().authErrBasic); return; }
  $("authBtn").disabled = true; err("authErr");
  try{
    if(authMode==="signup"){
      const {data,error} = await sb.auth.signUp({email,password:pass});
      if(error) throw error;
      if(!data.session){ err("authErr", S().authErrConfirm); return; }
    } else {
      const {error} = await sb.auth.signInWithPassword({email,password:pass});
      if(error) throw error;
    }
  }catch(e){
    err("authErr", translateAuthError(e.message));
  }finally{ $("authBtn").disabled = false; }
};
function translateAuthError(m){
  const t = S();
  if(/invalid login/i.test(m)) return t.authErrInvalid;
  if(/already registered/i.test(m)) return t.authErrExists;
  if(/rate limit/i.test(m)) return t.authErrRate;
  return t.authErrGeneric(m);
}
$("logoutBtn").onclick = async ()=>{ await sb.auth.signOut(); };

sb.auth.onAuthStateChange((_ev, session)=>{
  USER = session?.user ?? null;
  if(USER){
    $("userEmail").style.display="";
    $("logoutBtn").style.display="";
    $("userEmail").textContent = USER.email;
    loadEntitlement();
    loadShelf();
  } else {
    $("userEmail").style.display="none";
    $("logoutBtn").style.display="none";
    show("vAuth");
  }
});

/* =====================================================================
   الرف
===================================================================== */
async function loadShelf(){
  show("vShelf");
  const grid = $("capGrid"); grid.classList.add("loading");
  const {data,error} = await sb.from("capsules")
    .select("id,title,status,seal_date,open_date,opened_at,frequency,checkin_weekday,checkin_monthday,next_checkin_at,recipient_name")
    .order("created_at",{ascending:false});
  grid.classList.remove("loading");
  if(error){ toast(S().errLoadShelf(error.message)); return; }
  CAP_COUNT = data.length;

  $("shelfSub").textContent = data.length ? S().shelfSubN(data.length) : "";
  $("shelfEmpty").style.display = data.length ? "none" : "block";
  grid.innerHTML = "";

  for(const c of data){
    const t = S();
    const isReady = c.status!=="opened" && c.open_date <= today();
    const days = Math.max(0, Math.ceil((new Date(c.open_date) - new Date(today()))/86400000));
    const el = document.createElement("div");
    el.className = "cap" + (c.status==="opened" ? " opened":"");
    const sealedLabel = LANG==="ar" ? (c.status==="opened"?"فُتحت":"مختومة") : (c.status==="opened"?"Opened":"Sealed");
    el.innerHTML = `
      <div class="seal">${sealedLabel}</div>
      <div class="title">${esc(c.title)}</div>
      ${ c.recipient_name ? `<div class="meta">✉️ ${LANG==="ar"?"موجّهة إلى":"For"}: ${esc(c.recipient_name)}</div>` : `` }
      <div class="meta">${LANG==="ar"?"خُتمت في":"Sealed on"} ${fmt(c.seal_date)}<br>${LANG==="ar"?"موعد الفتح":"Opens on"}: ${fmt(c.open_date)}</div>
      ${ c.status==="opened" ? `<span class="opened-tag">${LANG==="ar"?"مفتوحة — اقرأها متى شئت":"Opened — read anytime"}</span>`
        : isReady ? `<span class="ready-tag">${LANG==="ar"?"حان موعد الفتح":"Ready to open"}</span>`
        : `<div class="count">${num(days)} <small>${t.daysSuffix}</small></div>` }`;
    el.onclick = ()=> openCapsuleView(c);
    grid.appendChild(el);
  }
}

function freqDayOptions(){
  const f = $("ncFreq").value, sel = $("ncFreqDay");
  const prevVal = sel.value;
  sel.style.display = f==="none" ? "none":"block";
  sel.innerHTML = "";
  const days = WEEKDAYS[LANG];
  if(f==="weekly"){
    days.forEach((d,i)=> sel.insertAdjacentHTML("beforeend",`<option value="${i}">${S().weeklyOpt(d)}</option>`));
    sel.value = prevVal && prevVal!=="" ? prevVal : "5";
  } else if(f==="monthly"){
    for(let i=1;i<=28;i++) sel.insertAdjacentHTML("beforeend",`<option value="${i}">${S().monthlyOpt(i)}</option>`);
    sel.value = prevVal && prevVal!=="" ? prevVal : "1";
  }
}
$("ncFreq").onchange = freqDayOptions;

document.querySelectorAll("#presets .preset").forEach(p=> p.onclick = ()=>{
  const d = new Date();
  if(p.dataset.d) d.setDate(d.getDate() + Number(p.dataset.d));
  else d.setMonth(d.getMonth() + Number(p.dataset.m));
  $("ncDate").value = d.toISOString().slice(0,10);
  document.querySelectorAll("#presets .preset").forEach(x=>x.classList.toggle("on", x===p));
});
$("ncDate").oninput = ()=> document.querySelectorAll("#presets .preset").forEach(p=>p.classList.remove("on"));

function addMsRow(){

  const row = document.createElement("div");
  row.className = "ms-row";
  row.innerHTML = `
    <input type="text" class="ms-title" placeholder="${S().msTitlePh}" maxlength="80" />
    <input type="date" class="ms-date" />
    <button type="button" class="del">×</button>`;
  row.querySelector(".del").onclick = ()=> row.remove();
  rows.appendChild(row);
}
$("addMsBtn").onclick = addMsRow;

let NC_FOR = "self";
function setNcFor(mode){
  NC_FOR = mode;

  document.querySelectorAll("#ncFor .preset").forEach(p=> p.classList.toggle("on", p.dataset.for===mode));
  $("ncRecipientBlock").style.display = mode==="other" ? "block":"none";

    $("ncForHint").textContent = t.ncForHintOther;

function openNewForm(){
  $("ncTitle").value=""; $("ncPledge").value=""; $("ncDate").value="";

$("sealCapBtn").onclick = async ()=>{
  const t = S();
  const title = clean($("ncTitle").value);
  const pledge = clean($("ncPledge").value);
  const openDate = $("ncDate").value;
  const freq = $("ncFreq").value;
  const day = Number($("ncFreqDay").value);
  const recipientName = clean($("ncRecipientName").value);
  const recipientEmail = clean($("ncRecipientEmail").value);

  if(NC_FOR==="other"){
    if(recipientName.length < 2){ err("ncErr", t.errRecipName); return; }
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(recipientEmail)){ err("ncErr", t.errRecipEmail); return; }
  }
  if(title.length < 2){ err("ncErr", t.errTitle); return; }
  if(pledge.length < 8){ err("ncErr", NC_FOR==="other" ? t.errPledgeOther : t.errPledgeSelf); return; }
  if(!openDate || openDate <= today()){ err("ncErr", t.errDate); return; }

  const milestones = [];
  for(const row of $("msRows").children){
    const mt = clean(row.querySelector(".ms-title").value);
    const d = row.querySelector(".ms-date").value;
    if(mt && d){
      if(d > openDate){ err("ncErr", t.errMsDate(mt)); return; }
      milestones.push({title:mt, due_date:d});
    }
  }

  err("ncErr"); $("sealCapBtn").disabled = true;
  try{
    const cap = {
      user_id: USER.id, title, open_date: openDate, frequency: freq,
      checkin_weekday: freq==="weekly" ? day : null,
      checkin_monthday: freq==="monthly" ? day : null,
      recipient_name: NC_FOR==="other" ? recipientName : null,
      recipient_email: NC_FOR==="other" ? recipientEmail : null,
    };
    const {data:c, error:e1} = await sb.from("capsules").insert(cap).select().single();
    if(e1) throw e1;

    const {error:e2} = await sb.from("capsule_secrets").insert({
      capsule_id:c.id, user_id:USER.id, pledge_text:pledge, letter_json:{source:"app"}
    });
    if(e2) throw e2;

    if(milestones.length){
      const {error:e3} = await sb.from("milestones").insert(
        milestones.map(m=>({...m, capsule_id:c.id, user_id:USER.id}))
      );
      if(e3) throw e3;
    }
    toast(NC_FOR==="other" ? t.sealedToastOther(recipientName) : t.sealedToastSelf);
    CAP_COUNT++;
    FIRST_ENTRY_HINT = true;
    openCapsuleView(c);
  }catch(e){
    err("ncErr", t.errSeal(e.message));
  }finally{ $("sealCapBtn").disabled = false; }
};

/* =====================================================================
   عرض كبسولة — مختومة أو حان فتحها
===================================================================== */
async function openCapsuleView(c){
  CURRENT = c;
  if(c.status === "opened"){ await showCeremony(c); return; }

  const t = S();
  const isReady = c.open_date <= today();
  show("vCap");
  $("cTitle").textContent = c.title;
  $("cSealedSince").textContent = c.recipient_name
    ? t.sealedSinceOther(c.recipient_name, fmt(c.seal_date))
    : t.sealedSinceSelf(fmt(c.seal_date));
  $("cSealedBlock").style.display = isReady ? "none":"block";
  $("cReadyBlock").style.display = isReady ? "block":"none";
  if(isReady) return;

  const days = Math.max(0, Math.ceil((new Date(c.open_date) - new Date(today()))/86400000));
  $("firstBanner").style.display = FIRST_ENTRY_HINT ? "block" : "none";
  FIRST_ENTRY_HINT = false;
  $("cDays").textContent = num(days) + " " + t.daysSuffix;
  $("cOpenDate").textContent = t.openDatePrefix(fmt(c.open_date));
  $("cFreq").textContent =
    c.frequency==="none" ? t.freqNone :
    c.frequency==="weekly" ? t.freqWeekly(WEEKDAYS[LANG][c.checkin_weekday]) :
    t.freqMonthly(num(c.checkin_monthday));
  $("cEntryText").value = ""; err("cErr");

  $("cEntries").textContent = "…";
  const {data:cnt} = await sb.rpc("count_entries",{p_capsule:c.id});
  $("cEntries").textContent = num(cnt ?? 0);

  $("cMsQs").innerHTML = "";
  const {data:due} = await sb.rpc("due_milestones",{p_capsule:c.id});
  for(const m of (due??[])){
    const box = document.createElement("div");
    box.className = "ms-q";
    box.innerHTML = `
      <div class="t">${t.msTodayQ(esc(m.title))}</div>
      <div class="yesno">
        <span class="yn" data-v="yes">${t.yes}</span>
        <span class="yn" data-v="no">${t.notYet}</span>
      </div>
      <input type="text" class="ms-note" placeholder="${t.msNotePh}" maxlength="200" />
      <div class="actions"><button class="btn-ghost btn-sm ms-save" type="button">${t.msSaveBtn}</button></div>`;
    let val = null;
    box.querySelectorAll(".yn").forEach(y=> y.onclick = ()=>{
      val = y.dataset.v;
      box.querySelectorAll(".yn").forEach(x=>x.classList.toggle("on",x===y));
    });
    box.querySelector(".ms-save").onclick = async ()=>{
      if(!val){ toast(t.msChoose); return; }
      const note = clean(box.querySelector(".ms-note").value);
      const {error} = await sb.rpc("answer_milestone",{
        p_milestone:m.id, p_reached: val==="yes", p_note: note || null
      });
      if(error){ toast(t.msSaveErr(error.message)); return; }
      box.remove(); toast(t.msSavedToast);
    };
    $("cMsQs").appendChild(box);
  }
}
$("backBtn").onclick = ()=> loadShelf();

$("sealEntryBtn").onclick = async ()=>{

async function showCeremony(c){
  const t = S();
  show("vOpen");
  $("oTitle").textContent = c.title;
  $("oMeta").textContent = c.recipient_name
    ? t.ceremonyMetaOther(c.recipient_name, fmt(c.seal_date), fmt(c.opened_at || new Date()))
    : t.ceremonyMeta(fmt(c.seal_date), fmt(c.opened_at || new Date()));

  const {data:sec} = await sb.from("capsule_secrets")
    .select("pledge_text").eq("capsule_id",c.id).single();
  $("oPledge").textContent = sec ? `«${sec.pledge_text}»` : t.pledgeDash;

  const {data:entries} = await sb.from("entries")
    .select("content,sealed_at").eq("capsule_id",c.id).order("sealed_at");
  const eBox = $("oEntries"); eBox.innerHTML = "";
  if(entries?.length){
    $("oEntriesSec").style.display = "";
    entries.forEach((e,i)=>{
      eBox.insertAdjacentHTML("beforeend",
        `<div class="entry"><div class="d">${t.entryLine(i+1, fmt(e.sealed_at))}</div>
         <div class="c">${esc(e.content)}</div></div>`);
    });
  } else $("oEntriesSec").style.display = "none";

  const {data:ms} = await sb.from("milestones")
    .select("title,due_date,reached,answer_note").eq("capsule_id",c.id).order("due_date");
  const mBox = $("oMs"); mBox.innerHTML = "";
  if(ms?.length){
    $("oMsSec").style.display = "";
    ms.forEach(m=>{
      const state = m.reached===true ? `<span class="ok">${t.reached}</span>`
                  : m.reached===false ? `<span class="no">${t.notReached}</span>`
                  : `<span class="no">${t.noAnswer}</span>`;
      mBox.insertAdjacentHTML("beforeend",
        `<div class="ms-line">${esc(m.title)} (${fmt(m.due_date)}) — ${state}${m.answer_note?` — «${esc(m.answer_note)}»`:""}</div>`);
    });
  } else $("oMsSec").style.display = "none";
}
