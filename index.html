<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>عهد — بريدٌ عابرٌ للزمن</title>
<meta name="description" content="عهد: منصة الكبسولات الزمنية. اكتب عهدًا لنفسك، أو رسالة لشخص تحبه — تُختم اليوم، وتصل حين يحين وقتها." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --night:#0c0f16;
  --panel:rgba(18,23,36,.72);
  --line:rgba(148,163,184,.14);
  --text:#e9ecf4;
  --muted:#98a1b3;
  --gold:#c9a227;
  --gold-2:#e3c565;
  --gold-dim:rgba(201,162,39,.35);
  --paper:#f3ead7;
  --paper-2:#eadfc6;
  --ink:#2b241a;
  --radius:18px;
  --ui:"Tajawal", system-ui, sans-serif;
  --letter:"Amiri", "Tajawal", serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;font-family:var(--ui);color:var(--text);line-height:1.7;
  background:
    radial-gradient(1100px 600px at 85% -10%, rgba(201,162,39,.07), transparent 60%),
    radial-gradient(800px 500px at 0% 10%, rgba(60,80,140,.10), transparent 55%),
    var(--night);
  min-height:100vh;
}
.wrap{width:min(980px,100%);margin:0 auto;padding:22px 16px 0}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:14px;color:var(--muted)}
.brand .seal-dot{width:12px;height:12px;border-radius:50%;
  background:radial-gradient(circle at 32% 30%, var(--gold-2), var(--gold) 60%, #7a621a);
  box-shadow:0 0 0 5px rgba(201,162,39,.10)}
.lang-btn{border:1px solid var(--gold-dim);border-radius:999px;padding:7px 15px;font-size:12.5px;font-weight:800;
  color:var(--gold-2);background:rgba(201,162,39,.06);cursor:pointer}
.lang-btn:hover{background:rgba(201,162,39,.12)}

/* fade-in */
.reveal{opacity:0;transform:translateY(16px);animation:revealIn .7s ease both}
@keyframes revealIn{to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){ .reveal{animation:none;opacity:1;transform:none} }

/* ---------- HERO ---------- */
.hero-sec{text-align:center;padding:34px 0 10px}
.kicker{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:800;letter-spacing:.5px;
  color:var(--gold-2);border:1px solid var(--gold-dim);border-radius:999px;padding:6px 14px;
  background:rgba(201,162,39,.06);margin-bottom:20px}
h1.hero{font-family:var(--letter);font-weight:700;font-size:44px;line-height:1.4;margin:0 0 16px}
h1.hero .gold{color:var(--gold-2)}
.hero-sub{color:var(--muted);font-size:16.5px;max-width:600px;margin:0 auto 30px}

/* the seal — signature element */
.seal-stage{position:relative;width:168px;height:168px;margin:0 auto 30px}
.seal-orbit{position:absolute;inset:0}
.seal-orbit .ring{position:absolute;inset:0;border-radius:50%}
.seal-orbit .ring.r1{border:1px solid rgba(201,162,39,.22);animation:spin 19s linear infinite}
.seal-orbit .ring.r2{inset:20px;border:1px dashed rgba(148,163,184,.16);animation:spinR 26s linear infinite}
.seal-orbit .dot{position:absolute;width:6px;height:6px;border-radius:50%;top:-3px;left:50%;margin-left:-3px;
  background:#e3c565;box-shadow:0 0 9px rgba(227,197,101,.6)}
.seal-orbit .ring.r2 .dot{width:5px;height:5px;margin-left:-2.5px;background:#7fb8e8;box-shadow:0 0 8px rgba(127,184,232,.5)}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes spinR{from{transform:rotate(360deg)}to{transform:rotate(0)}}
.wax-big{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:104px;height:104px;border-radius:50%;
  background:radial-gradient(circle at 32% 28%, #efd88a, var(--gold) 45%, #8a6f1c 85%);
  box-shadow:0 10px 24px rgba(0,0,0,.4), 0 0 0 6px rgba(201,162,39,.12);
  display:grid;place-items:center;color:#241c05;font-family:var(--letter);font-weight:700;font-size:30px;
  animation:waxPulse 3.6s ease-in-out infinite;
}
@keyframes waxPulse{
  0%,100%{box-shadow:0 10px 24px rgba(0,0,0,.4), 0 0 0 6px rgba(201,162,39,.12)}
  50%{box-shadow:0 10px 28px rgba(0,0,0,.45), 0 0 0 11px rgba(201,162,39,.2)}
}

.stat-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.chip{border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:12px;font-weight:700;
  color:var(--muted);background:rgba(18,23,36,.5)}

.scroll-cue{display:inline-block;margin-top:18px;color:var(--muted);font-size:13px;text-decoration:none;
  border-bottom:1px dashed var(--gold-dim);padding-bottom:2px}
.scroll-cue:hover{color:var(--gold-2)}

/* ---------- HOW ---------- */
.section{padding:64px 0}
.section-head{text-align:center;margin-bottom:36px}
.section-head h2{font-family:var(--letter);font-weight:700;font-size:27px;margin:0 0 8px;color:#f3ead7}
.section-head p{color:var(--muted);font-size:14.5px;margin:0}

.how-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:760px){.how-grid{grid-template-columns:1fr}}
.hs{border:1px solid var(--line);border-radius:16px;padding:24px 20px;background:var(--panel);
  backdrop-filter:blur(6px);position:relative}
.hs .n{font-family:var(--letter);font-size:15px;font-weight:700;color:var(--gold-2);margin-bottom:10px}
.hs .t{font-weight:800;color:#f3ead7;font-size:16.5px;margin-bottom:8px}
.hs .b{font-size:13.5px;color:var(--muted);line-height:1.9}

/* ---------- FORK ---------- */
.fork-sec{padding:70px 0 80px}
.fork-wrap{position:relative;max-width:760px;margin:0 auto}
.fork-svg{width:100%;height:auto;display:block;margin-bottom:-1px}
.fork-svg .fk-line{fill:none;stroke:var(--gold-dim);stroke-width:1.5}
.fork-cards{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:-6px}
@media(max-width:700px){.fork-cards{grid-template-columns:1fr}}
.fcard{
  border:1px solid var(--line);border-radius:18px;padding:28px 24px;text-align:center;
  background:linear-gradient(180deg,rgba(18,23,36,.9),rgba(13,18,30,.75));
  transition:border-color .15s, transform .12s;
}
.fcard:hover{border-color:var(--gold-dim);transform:translateY(-3px)}
.fcard .ft{font-family:var(--letter);font-size:22px;font-weight:700;color:#f3ead7;margin:0 0 10px}
.fcard .fb{font-size:13.5px;color:var(--muted);line-height:1.9;margin:0 0 20px;min-height:70px}
a.cta-btn{display:inline-block;text-decoration:none;color:#191302;font-weight:800;font-size:15px;
  background:linear-gradient(135deg,var(--gold-2),var(--gold));padding:12px 26px;border-radius:14px;
  box-shadow:0 10px 26px rgba(201,162,39,.2)}
a.cta-btn:hover{filter:brightness(1.08)}
a.cta-btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line);box-shadow:none}
a.cta-btn.ghost:hover{border-color:var(--gold-dim)}

footer{max-width:980px;margin:0 auto;padding:20px 16px 50px;text-align:center;color:var(--muted);font-size:12px}
footer .l{color:var(--gold-2)}
footer a{color:var(--muted);text-decoration:underline;font-size:12px}

@media (max-width:640px){
  h1.hero{font-size:29px;line-height:1.45}
  .hero-sub{font-size:15.5px}
  .section-head h2{font-size:23px}
  .fcard .ft{font-size:19px}
}
</style>
</head>
<body>

<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <span class="seal-dot"></span>
      <span id="brandText"></span>
    </div>
    <button class="lang-btn" id="langBtn" type="button">EN</button>
  </div>

  <!-- ================= HERO ================= -->
  <section class="hero-sec reveal">
    <span class="kicker" id="kicker"></span>
    <h1 class="hero" id="heroTitle"></h1>
    <p class="hero-sub" id="heroSub"></p>

    <div class="seal-stage">
      <div class="seal-orbit">
        <div class="ring r1"><span class="dot"></span></div>
        <div class="ring r2"><span class="dot"></span></div>
      </div>
      <div class="wax-big">عَهْد</div>
    </div>

    <div class="stat-row">
      <div class="chip" id="statChip" style="display:none"></div>
      <div class="chip" id="subsChip" style="display:none"></div>
    </div>

    <a class="scroll-cue" href="#how" id="scrollCue"></a>
  </section>

  <!-- ================= HOW ================= -->
  <section class="section" id="how">
    <div class="section-head reveal">
      <h2 id="howTitle"></h2>
      <p id="howSub"></p>
    </div>
    <div class="how-grid">
      <div class="hs reveal"><div class="n" id="hn1"></div><div class="t" id="ht1"></div><div class="b" id="hb1"></div></div>
      <div class="hs reveal" style="animation-delay:.08s"><div class="n" id="hn2"></div><div class="t" id="ht2"></div><div class="b" id="hb2"></div></div>
      <div class="hs reveal" style="animation-delay:.16s"><div class="n" id="hn3"></div><div class="t" id="ht3"></div><div class="b" id="hb3"></div></div>
    </div>
  </section>

  <!-- ================= FORK ================= -->
  <section class="fork-sec">
    <div class="section-head reveal">
      <h2 id="forkTitle"></h2>
      <p id="forkSub"></p>
    </div>
    <div class="fork-wrap reveal">
      <svg class="fork-svg" viewBox="0 0 760 70" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path class="fk-line" d="M380,0 L380,20 L180,50 L180,70"/>
        <path class="fk-line" d="M380,0 L380,20 L580,50 L580,70"/>
        <circle cx="380" cy="8" r="5" fill="#c9a227"/>
      </svg>
      <div class="fork-cards">
        <div class="fcard">
          <div class="ft" id="fcSelfT"></div>
          <p class="fb" id="fcSelfB"></p>
          <a class="cta-btn" id="fcSelfBtn" href="write.html"></a>
        </div>
        <div class="fcard">
          <div class="ft" id="fcOtherT"></div>
          <p class="fb" id="fcOtherB"></p>
          <a class="cta-btn ghost" id="fcOtherBtn" href="app.html"></a>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <span id="footerText"></span>
    <div style="margin-top:10px"><a href="app.html" id="shelfLink"></a></div>
  </footer>
</div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const LANG_KEY = "future_letter_lang";
let LANG = localStorage.getItem(LANG_KEY) || "ar";

const SUPABASE_URL = "https://eppgvtreajfstwybodmn.supabase.co";
const SUPABASE_KEY = "sb_publishable_QhdDI8rpmw_1NmOml4d0wQ_n8iNYuKS";
const STAT_MIN_SHOW = 50;
const SUB_MIN_SHOW = 1;
let PACTS = null, SUBS = null;
const numLatin = n => Number(n).toLocaleString("en-US");

async function rpcCall(name){
  try{
    const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${name}`,{
      method:"POST",
      headers:{ "apikey":SUPABASE_KEY, "Authorization":`Bearer ${SUPABASE_KEY}`, "Content-Type":"application/json" },
      body:"{}"
    });
    if(!r.ok) return null;
    return await r.json();
  }catch(e){ return null; }
}
function renderStat(){
  const c = $("statChip");
  if(typeof PACTS === "number" && PACTS >= STAT_MIN_SHOW){ c.textContent = S().statChip(PACTS); c.style.display=""; }
  else c.style.display="none";
  const sc = $("subsChip");
  if(typeof SUBS === "number" && SUBS >= SUB_MIN_SHOW){ sc.textContent = S().subsChip(SUBS); sc.style.display=""; }
  else sc.style.display="none";
}
async function loadStats(){
  const [pacts,subs] = await Promise.all([rpcCall("public_pact_count"), rpcCall("public_subscriber_count")]);
  if(typeof pacts==="number") PACTS=pacts;
  if(typeof subs==="number") SUBS=subs;
  renderStat();
}

const T = {
ar:{
  brand:"بريدٌ عابرٌ للزمن",
  kicker:"عهد — منصة الكبسولات الزمنية",
  heroTitle:`عهدٌ تكتبه اليوم…<br><span class="gold">ويصلك حين يحين وقته</span>`,
  heroSub:"اكتب حلمك أو هدفك أو رسالة لشخص تحبه — نختمها عنك، ونعيدها كاملة في الموعد الذي تختاره، ومعها كل ما مررت به في الطريق.",
  scrollCue:"↓ كيف تعمل «عهد»",
  howTitle:"كيف تعمل؟",
  howSub:"ثلاث خطوات، وينتهي بها الأمر إلى رسالة لا تشبه أي شيء آخر.",
  h1:{n:"١",t:"اكتب واختم",b:"عهدك أو رسالتك بكلماتك، وتاريخ الفتح باختيارك — بعد أشهر أو سنوات. من لحظة الختم، لا يستطيع أحد قراءتها، ولا حتى أنت."},
  h2:{n:"٢",t:"نتابعك في الطريق",b:"سؤال واحد يصلك دوريًا، وإجابتك تُختم مع الرسالة — مذكرةً فوق مذكرة، حتى يوم الفتح."},
  h3:{n:"٣",t:"يوم الفتح",b:"في موعده يُفتح كل شيء دفعة واحدة: العهد أو الرسالة، والمذكرات، والمحطات — قصة كاملة تُقرأ بعين مختلفة."},
  forkTitle:"والرسالة… لمن تكتبها؟",
  forkSub:"اختر الطريق الذي يناسبك.",
  fcSelfT:"لنفسك",
  fcSelfB:"جرّب التجربة المجانية الآن: خمس أسئلة تتأكد أنك أنت، ثم رسالة كاملة كأنها كُتبت من نفسك بعد عشر سنوات — وعهد تختمه في النهاية.",
  fcSelfBtn:"اكتب رسالتك",
  fcOtherT:"لشخص تحبه",
  fcOtherB:"اكتب كبسولة موجّهة لشخص آخر — ابنك، صديقك، أحد والديك — تُفتح له في التاريخ الذي تختاره أنت. هدية، أو تذكير، أو وعد لا يُنسى.",
  fcOtherBtn:"ادخل إلى المنصة",
  statChip:n=>`${numLatin(n)} عهدًا مختومًا حتى الآن`,
  subsChip:n=>`${numLatin(n)} مشتركين فعليين في «عهد»`,
  footer:`كل ما تكتبه يبقى مختومًا حتى موعده. <span class="l">الرسالة رسالتك.</span>`,
  shelfLink:"لديك حساب على «عهد»؟ ادخل إلى رفّ الكبسولات"
},
en:{
  brand:"Mail Across Time",
  kicker:"Ahd — the time-capsule platform",
  heroTitle:`A pact you write today…<br><span class="gold">arrives when its time comes</span>`,
  heroSub:"Write a dream, a goal, or a message to someone you love — we seal it for you, and return it in full on the date you choose, along with everything you went through along the way.",
  scrollCue:"↓ How Ahd works",
  howTitle:"How does it work?",
  howSub:"Three steps, ending in a letter unlike anything else.",
  h1:{n:"1",t:"Write and seal",b:"Your pact or message, in your own words, with an opening date you choose — months or years from now. From the moment it's sealed, no one can read it, not even you."},
  h2:{n:"2",t:"We check in with you",b:"One question arrives periodically, and your answer is sealed alongside it — entry after entry, until opening day."},
  h3:{n:"3",t:"Opening day",b:"Everything opens at once, on schedule: the pact or message, the entries, the milestones — a full story read with different eyes."},
  forkTitle:"And the letter… who is it for?",
  forkSub:"Choose the path that fits.",
  fcSelfT:"For yourself",
  fcSelfB:"Try the free experience now: five questions to confirm it's really you, then a full letter as if written by your future self — ending in a pact you seal.",
  fcSelfBtn:"Write your letter",
  fcOtherT:"For someone you love",
  fcOtherB:"Write a capsule addressed to someone else — your child, a friend, a parent — opened for them on the date you choose. A gift, a reminder, a promise not to forget.",
  fcOtherBtn:"Go to the platform",
  statChip:n=>`${numLatin(n)} pacts sealed so far`,
  subsChip:n=>`${numLatin(n)} active subscribers on Ahd`,
  footer:`Everything you write stays sealed until its time. <span class="l">The letter is yours.</span>`,
  shelfLink:"Already have an Ahd account? Go to your capsule shelf"
}
};
const S = () => T[LANG];

function applyStatic(){
  const t = S();
  document.documentElement.lang = LANG;
  document.documentElement.dir = LANG==="ar" ? "rtl":"ltr";
  $("brandText").textContent = t.brand;
  $("langBtn").textContent = LANG==="ar" ? "EN":"عربي";
  $("kicker").textContent = t.kicker;
  $("heroTitle").innerHTML = t.heroTitle;
  $("heroSub").textContent = t.heroSub;
  $("scrollCue").textContent = t.scrollCue;
  $("howTitle").textContent = t.howTitle;
  $("howSub").textContent = t.howSub;
  $("hn1").textContent=t.h1.n; $("ht1").textContent=t.h1.t; $("hb1").textContent=t.h1.b;
  $("hn2").textContent=t.h2.n; $("ht2").textContent=t.h2.t; $("hb2").textContent=t.h2.b;
  $("hn3").textContent=t.h3.n; $("ht3").textContent=t.h3.t; $("hb3").textContent=t.h3.b;
  $("forkTitle").textContent = t.forkTitle;
  $("forkSub").textContent = t.forkSub;
  $("fcSelfT").textContent = t.fcSelfT;
  $("fcSelfB").textContent = t.fcSelfB;
  $("fcSelfBtn").textContent = t.fcSelfBtn;
  $("fcOtherT").textContent = t.fcOtherT;
  $("fcOtherB").textContent = t.fcOtherB;
  $("fcOtherBtn").textContent = t.fcOtherBtn;
  $("footerText").innerHTML = t.footer;
  $("shelfLink").textContent = t.shelfLink;
  renderStat();
}

$("langBtn").addEventListener("click", ()=>{
  LANG = LANG==="ar" ? "en":"ar";
  localStorage.setItem(LANG_KEY, LANG);
  applyStatic();
});

applyStatic();
loadStats();
</script>
</body>
</html>
