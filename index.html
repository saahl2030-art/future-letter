<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>عهد — بريدٌ عابرٌ للزمن</title>
<meta name="description" content="عهد: اكتب عهدًا لنفسك أو رسالة لشخص تحبه — تُختم اليوم، وتصل حين يحين وقتها." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --night:#0c0f16;
  --night-2:#121724;
  --panel:rgba(18,23,36,.72);
  --line:rgba(148,163,184,.14);
  --text:#d9dce4;
  --muted:#98a1b3;
  --gold:#c9a227;
  --gold-2:#e3c565;
  --gold-dim:rgba(201,162,39,.35);
  --paper:#f3ead7;
  --paper-2:#eadfc6;
  --ink:#2b241a;
  --ink-soft:#4a4132;
  --danger:#e0655a;
  --radius:18px;
  --ui:"Tajawal", system-ui, sans-serif;
  --letter:"Amiri", "Tajawal", serif;
}
html[data-theme="light"]{
  --night:#faf6ef;
  --night-2:#f2ece1;
  --panel:rgba(255,255,255,.6);
  --line:rgba(43,36,26,.14);
  --text:#241f18;
  --muted:#6b6255;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:var(--ui);
  color:var(--text);
  transition:background-color .25s ease, color .25s ease;
  background:
    radial-gradient(1100px 600px at 85% -10%, rgba(201,162,39,.07), transparent 60%),
    radial-gradient(800px 500px at 0% 10%, rgba(60,80,140,.10), transparent 55%),
    var(--night);
  min-height:100vh;
  padding:22px 16px 60px;
  line-height:1.7;
}
.wrap{width:min(820px,100%);margin:0 auto}

/* ---------- top bar ---------- */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;flex-wrap:wrap;margin-bottom:26px;
}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:14px;color:var(--muted)}
.brand .seal-dot{
  width:13px;height:13px;border-radius:50%;
  background:radial-gradient(circle at 32% 30%, var(--gold-2), var(--gold) 60%, #7a621a);
  box-shadow:0 0 0 5px rgba(201,162,39,.10);
}
.top-tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.chip{
  border:1px solid var(--line);border-radius:999px;
  padding:7px 13px;font-size:12px;font-weight:700;color:var(--muted);
  background:rgba(18,23,36,.55);
}
.lang-btn{
  border:1px solid var(--gold-dim);border-radius:999px;
  padding:7px 15px;font-size:12.5px;font-weight:800;
  color:var(--gold-2);background:rgba(201,162,39,.06);cursor:pointer;
}
.lang-btn:hover{background:rgba(201,162,39,.12)}

/* ---------- pact ribbon (return visit) ---------- */
.pact-ribbon{
  display:none;
  border:1px solid var(--gold-dim);
  background:linear-gradient(180deg, rgba(201,162,39,.08), rgba(201,162,39,.03));
  border-radius:var(--radius);
  padding:14px 16px;margin-bottom:18px;
}
.pact-ribbon.active{display:block}
.pact-ribbon .pr-title{font-weight:800;color:var(--gold-2);font-size:14px;margin-bottom:4px}
.pact-ribbon .pr-text{font-family:var(--letter);font-size:17px;color:var(--text)}
.pact-ribbon .pr-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

/* ---------- scenes ---------- */
.scene{display:none;animation:sceneIn .5s ease both}
.scene.active{display:block}
@keyframes sceneIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ---------- intro ---------- */
.kicker{
  display:inline-flex;align-items:center;gap:8px;
  font-size:12px;font-weight:800;letter-spacing:.6px;color:var(--gold-2);
  border:1px solid var(--gold-dim);border-radius:999px;padding:6px 14px;
  background:rgba(201,162,39,.06);margin-bottom:18px;
}
h1.hero{
  font-family:var(--letter);
  font-weight:700;font-size:42px;line-height:1.35;margin:0 0 14px;
}
h1.hero .gold{color:var(--gold-2)}
.hero-sub{color:var(--muted);font-size:16px;max-width:640px;margin:0 auto 30px}

/* seal (compact — replaces the old large envelope card) */
.envelope{
  position:relative;
  width:172px;height:172px;
  margin:22px auto 18px;
  transition:opacity .5s ease;
}
.wax{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:96px;height:96px;border-radius:50%;
  background:radial-gradient(circle at 32% 28%, #efd88a, var(--gold) 45%, #8a6f1c 85%);
  box-shadow:0 8px 18px rgba(0,0,0,.35), 0 0 0 6px rgba(201,162,39,.14);
  display:grid;place-items:center;text-align:center;
  color:#241c05;font-weight:800;font-size:11.5px;line-height:1.5;
  transition:transform .5s ease, opacity .5s ease;
  animation:waxPulse 3.4s ease-in-out infinite;
  padding:8px;z-index:2;
}
.wax .yr{font-family:var(--letter);font-size:19px;font-weight:700;display:block}
.envelope.opened .wax{transform:translate(-50%,-50%) scale(1.25);opacity:0}
@keyframes waxPulse{
  0%,100%{box-shadow:0 8px 18px rgba(0,0,0,.35), 0 0 0 6px rgba(201,162,39,.14)}
  50%{box-shadow:0 8px 22px rgba(0,0,0,.4), 0 0 0 11px rgba(201,162,39,.22)}
}
/* مدارات حول الختم — تلمح إلى الزمن الدائر حول الرسالة المختومة */
.seal-orbit{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:172px;height:172px;pointer-events:none;transition:opacity .5s ease;
}
.envelope.opened .seal-orbit{opacity:0}
.seal-orbit .ring{position:absolute;inset:0;border-radius:50%}
.seal-orbit .ring.r1{border:1px solid rgba(201,162,39,.22);animation:spin 17s linear infinite}
.seal-orbit .ring.r2{inset:18px;border:1px dashed rgba(148,163,184,.16);animation:spinReverse 24s linear infinite}
.seal-orbit .dot{position:absolute;width:6px;height:6px;border-radius:50%;top:-3px;left:50%;margin-left:-3px;
  background:#e3c565;box-shadow:0 0 9px rgba(227,197,101,.6)}
.seal-orbit .ring.r2 .dot{width:5px;height:5px;margin-left:-2.5px;background:#7fb8e8;box-shadow:0 0 8px rgba(127,184,232,.5)}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes spinReverse{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}
.seal-addr{
  text-align:center;margin:0 auto 26px;transition:opacity .5s ease;
  font-family:var(--letter);color:var(--muted);font-size:15px;line-height:1.9;
}
.seal-addr small{display:block;color:var(--muted);font-size:12px;font-family:var(--ui);font-weight:700;opacity:.8}
.envelope.opened + .seal-addr{opacity:0}

/* ---------- buttons ---------- */
button{
  font-family:var(--ui);font-weight:800;font-size:15px;
  border:0;border-radius:14px;padding:13px 22px;cursor:pointer;
  transition:transform .08s ease, filter .12s ease, box-shadow .12s ease;
}
button:hover{filter:brightness(1.08)}
button:active{transform:translateY(1px)}
button:focus-visible{outline:2px solid var(--gold-2);outline-offset:3px}
.btn-gold{
  color:#191302;
  background:linear-gradient(135deg, var(--gold-2), var(--gold));
  box-shadow:0 10px 26px rgba(201,162,39,.22);
}
.btn-ghost{
  background:transparent;color:var(--text);
  border:1px solid var(--line);
}
.btn-ghost:hover{border-color:var(--gold-dim)}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}

.gift-link{
  display:inline-block;margin-top:16px;color:var(--muted);font-size:13px;
  text-decoration:none;border-bottom:1px dashed var(--gold-dim);padding-bottom:2px;
}
.gift-link:hover{color:var(--gold-2)}
.mini-how{
  display:flex;justify-content:center;gap:22px;flex-wrap:wrap;
  margin-top:34px;padding-top:22px;border-top:1px solid var(--line);
}
.mh-item{
  display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);font-weight:700;
}
.mh-item b{
  display:inline-grid;place-items:center;width:20px;height:20px;border-radius:50%;
  background:rgba(201,162,39,.12);border:1px solid var(--gold-dim);color:var(--gold-2);
  font-size:11px;font-weight:800;
}
.mh-soon{
  font-style:normal;font-size:10.5px;font-weight:800;color:var(--gold-2);
  background:rgba(201,162,39,.1);border:1px solid var(--gold-dim);border-radius:999px;
  padding:1px 7px;margin-inline-start:2px;
}
@media(max-width:640px){
  .mini-how{gap:14px 20px}
}
.center{justify-content:center;text-align:center}

/* ---------- verification ---------- */
.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:26px 24px;
  backdrop-filter:blur(6px);
}
.v-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px;flex-wrap:wrap}
.v-step{font-size:12px;font-weight:800;color:var(--gold-2);letter-spacing:.5px}
.clarity{display:flex;align-items:center;gap:10px;min-width:190px;flex:0 0 auto}
.clarity .lbl{font-size:11.5px;color:var(--muted);font-weight:700;white-space:nowrap}
.clarity .bar{flex:1;height:7px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden;border:1px solid var(--line)}
.clarity .fill{height:100%;width:0%;background:linear-gradient(90deg, #7a621a, var(--gold), var(--gold-2));transition:width .7s ease}

.v-voice{
  font-family:var(--letter);
  font-size:22px;line-height:2.05;color:var(--text);
  border-inline-start:3px solid var(--gold);
  padding-inline-start:18px;
  margin:18px 0 22px;
}
.v-voice::before{content:"«";color:var(--gold-2)}
.v-voice::after{content:"»";color:var(--gold-2)}

label{display:block;font-size:13px;font-weight:800;color:var(--text);margin-bottom:9px}
input[type=text],input[type=number],textarea{
  width:100%;font-family:var(--ui);font-size:16px;color:var(--text);
  background:rgba(10,13,20,.6);
  border:1px solid var(--line);border-radius:14px;
  padding:14px;outline:none;transition:border-color .15s, box-shadow .15s;
}
input:focus,textarea:focus{border-color:var(--gold-dim);box-shadow:0 0 0 4px rgba(201,162,39,.10)}
textarea{min-height:100px;resize:vertical}
.hint{font-size:12px;color:var(--muted);margin-top:8px}
.err{font-size:12.5px;color:var(--danger);margin-top:8px;display:none;font-weight:700}
.err.active{display:block}

.choices{display:grid;gap:10px}
.choice{
  text-align:start;font-weight:700;font-size:15px;color:var(--text);
  background:rgba(10,13,20,.55);
  border:1px solid var(--line);border-radius:14px;padding:14px 16px;
}
.choice:hover{border-color:var(--gold-dim)}
.choice.selected{
  border-color:var(--gold);
  background:rgba(201,162,39,.10);
  color:var(--gold-2);
}
.choice .c-sub{display:block;font-size:12.5px;font-weight:500;color:var(--muted);margin-top:3px}
.choice.selected .c-sub{color:rgba(227,197,101,.8)}

/* ---------- letter ---------- */
.letter-stage{position:relative}
.paper{
  position:relative;
  background:
    radial-gradient(700px 300px at 50% -60px, rgba(201,162,39,.10), transparent 60%),
    linear-gradient(180deg, var(--paper), var(--paper-2));
  color:var(--ink);
  border-radius:6px;
  padding:52px clamp(22px,6vw,64px) 46px;
  box-shadow:0 40px 90px rgba(0,0,0,.55);
}
.paper::before,.paper::after{
  content:"";position:absolute;inset-inline:14px;height:10px;background:inherit;
  border-radius:6px;z-index:-1;box-shadow:0 6px 16px rgba(0,0,0,.25);
}
.paper::before{bottom:-6px;opacity:.6}
.paper::after{bottom:-12px;inset-inline:28px;opacity:.35}
.letter-meta{
  display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;
  font-size:12.5px;font-weight:700;color:var(--ink-soft);
  border-bottom:1px solid rgba(74,65,50,.22);
  padding-bottom:14px;margin-bottom:26px;
}
.letter-title{
  font-family:var(--letter);font-weight:700;font-size:27px;margin:0 0 20px;color:#1f1910;
}
.letter-body{
  font-family:var(--letter);
  font-size:19.5px;line-height:2.2;color:var(--ink);
  min-height:120px;
}
html[dir=ltr] .letter-body{font-size:18.5px;line-height:2}
.letter-body p{margin:0 0 22px}
.caret{
  display:inline-block;width:2px;height:1.05em;background:var(--gold);
  vertical-align:-0.15em;animation:blink 1s steps(1) infinite;
}
@keyframes blink{50%{opacity:0}}
.sig{
  font-family:var(--letter);font-size:20px;color:#1f1910;
  margin-top:8px;text-align:end;line-height:1.9;
}
.sig .who{font-weight:700}
.sig .when{font-size:14px;color:var(--ink-soft);font-family:var(--ui);font-weight:700}
.skip-row{display:flex;justify-content:center;margin-top:14px}
.skip-row button{font-size:13px;padding:9px 16px}

/* fork timeline */
.ps{
  margin-top:34px;border-top:1px dashed rgba(74,65,50,.35);padding-top:22px;
}
.ps .ps-title{font-family:var(--letter);font-weight:700;font-size:17px;color:#1f1910;margin:0 0 12px}
.fork{width:100%;height:auto;display:block}
.fork text{font-family:var(--ui);font-weight:700}

/* ---------- pact ---------- */
.pact-intro{
  font-family:var(--letter);font-size:22px;line-height:2;color:var(--text);
  margin:0 0 20px;
}
.card-preview{display:none;margin-top:26px;text-align:center}
.card-preview.active{display:block}
.cta-box{margin-top:24px;border:1px solid var(--gold-dim);border-radius:16px;padding:20px 18px;background:rgba(201,162,39,.06);text-align:center}
.cta-t{font-family:var(--letter);font-size:20px;color:var(--text);font-weight:700;margin-bottom:6px}
.cta-b{color:var(--muted);font-size:14px;line-height:1.9;margin:0 0 14px}
a.cta-a{display:inline-block;text-decoration:none;color:#191302;background:linear-gradient(135deg,var(--gold-2),var(--gold));padding:12px 24px;border-radius:14px;font-weight:800;font-size:15px}
.card-preview canvas{
  width:min(420px,100%);height:auto;border-radius:14px;
  box-shadow:0 30px 70px rgba(0,0,0,.55);
  border:1px solid var(--gold-dim);
}

/* toast */
.toast{
  position:fixed;bottom:20px;inset-inline-start:20px;
  background:rgba(18,23,36,.96);border:1px solid var(--gold-dim);
  color:var(--text);font-size:13.5px;font-weight:700;
  padding:11px 16px;border-radius:12px;display:none;z-index:99;
  box-shadow:0 14px 34px rgba(0,0,0,.4);
}

footer{margin-top:46px;text-align:center;color:var(--muted);font-size:12px}
footer .l{color:var(--gold-2)}

@media (max-width:640px){
  h1.hero{font-size:29px;line-height:1.45}
  .hero-sub{font-size:15.5px;line-height:1.85}
  .kicker{font-size:12.5px;padding:7px 14px}
  .chip{font-size:12.5px;padding:8px 14px}
  button{font-size:16px;padding:14px 20px}
  .v-voice{font-size:19px}
  .letter-body{font-size:17.5px;line-height:2.15}
  html[dir=ltr] .letter-body{font-size:16.5px}
  .paper{padding:36px 20px 34px}
  footer{font-size:13px}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <a class="brand" href="index.html" style="text-decoration:none">
      <span class="seal-dot"></span>
      <span id="brandText"></span>
    </a>
    <div class="top-tools">
      <div class="chip" id="statChip" style="display:none"></div>
      <div class="chip" id="subsChip" style="display:none"></div>
      <button class="lang-btn" id="themeBtn" type="button"></button>
      <button class="lang-btn" id="langBtn" type="button">EN</button>
    </div>
  </div>

  <div class="pact-ribbon" id="pactRibbon">
    <div class="pr-title" id="prTitle"></div>
    <div class="pr-text" id="prText"></div>
    <div class="pr-actions">
      <button class="btn-ghost" id="prViewBtn" type="button"></button>
      <button class="btn-ghost" id="prResetBtn" type="button"></button>
    </div>
  </div>

  <!-- ============ SCENE: INTRO ============ -->
  <section class="scene active" id="sceneIntro">
    <div style="text-align:center">
      <span class="kicker"><span id="kickerLbl"></span> <span id="kickerToday"></span></span>
      <h1 class="hero" id="heroTitle"></h1>
      <p class="hero-sub" id="heroSub"></p>

      <div class="envelope" id="envelope">
        <div class="seal-orbit">
          <div class="ring r1"><span class="dot"></span></div>
          <div class="ring r2"><span class="dot"></span></div>
        </div>
        <div class="wax"><span><span id="waxTop"></span><span class="yr" id="waxYear"></span></span></div>
      </div>
      <div class="seal-addr">
        <small id="addrFrom"></small>
        <span id="addrTo"></span>
      </div>

      <div class="actions center">
        <button class="btn-gold" id="startBtn" type="button"></button>
      </div>

      <a class="gift-link" id="giftLink" href="app.html"></a>

      <div class="mini-how" id="miniHow">
        <div class="mh-item"><b>1</b><span id="mh1"></span></div>
        <div class="mh-item"><b>2</b><span id="mh2"></span><em class="mh-soon" id="mh2soon"></em></div>
        <div class="mh-item"><b>3</b><span id="mh3"></span></div>
      </div>
    </div>
  </section>

  <!-- ============ SCENE: VERIFICATION ============ -->
  <section class="scene" id="sceneVerify">
    <div class="panel">
      <div class="v-head">
        <div class="v-step" id="vStep"></div>
        <div class="clarity">
          <span class="lbl" id="clarityLbl"></span>
          <div class="bar"><div class="fill" id="clarityFill"></div></div>
          <span class="lbl" id="clarityPct"></span>
        </div>
      </div>

      <div class="v-voice" id="vVoice"></div>
      <div id="vInputArea"></div>
      <div class="err" id="vErr"></div>

      <div class="actions">
        <button class="btn-gold" id="vNextBtn" type="button"></button>
        <button class="btn-ghost" id="vBackBtn" type="button" style="display:none"></button>
      </div>
    </div>
  </section>

  <!-- ============ SCENE: LETTER ============ -->
  <section class="scene" id="sceneLetter">
    <div class="letter-stage">
      <div class="paper">
        <div class="letter-meta">
          <span id="letterFrom"></span>
          <span id="letterVerified"></span>
        </div>
        <h2 class="letter-title" id="letterSalutation"></h2>
        <div class="letter-body" id="letterBody"></div>
        <div class="sig" id="letterSig" style="display:none">
          <span class="who" id="sigWho"></span><br>
          <span class="when" id="sigDate"></span>
        </div>

        <div class="ps" id="letterPS" style="display:none">
          <p class="ps-title" id="psTitle"></p>
          <svg class="fork" id="forkSvg" viewBox="0 0 700 240" xmlns="http://www.w3.org/2000/svg" role="img"></svg>
        </div>
      </div>

      <div class="skip-row">
        <button class="btn-ghost" id="skipBtn" type="button"></button>
      </div>

      <div class="actions center" id="letterActions" style="display:none">
        <button class="btn-gold" id="toPactBtn" type="button"></button>
        <button class="btn-ghost" id="copyLetterBtn" type="button"></button>
      </div>
    </div>
  </section>

  <!-- ============ SCENE: PACT ============ -->
  <section class="scene" id="scenePact">
    <div class="panel">
      <p class="pact-intro" id="pactIntro"></p>

      <label for="pactInput" id="pactLbl"></label>
      <textarea id="pactInput"></textarea>
      <div class="hint" id="pactHint"></div>
      <div class="err" id="pactErr"></div>

      <div class="actions">
        <button class="btn-gold" id="sealPactBtn" type="button"></button>
      </div>

      <div class="card-preview" id="cardPreview">
        <canvas id="pactCanvas" width="1080" height="1350"></canvas>
        <div class="actions center">
          <button class="btn-gold" id="downloadCardBtn" type="button"></button>
          <button class="btn-ghost" id="shareCardBtn" type="button"></button>
          <button class="btn-ghost" id="restartBtn" type="button"></button>
        </div>
        <div class="cta-box">
          <div class="cta-t" id="ctaTitle"></div>
          <p class="cta-b" id="ctaBody"></p>
          <a class="cta-a" id="ctaBtn" href="app.html"></a>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <span id="footerText"></span>
    <div style="margin-top:10px">
      <a id="shelfLink" href="app.html" style="color:var(--muted);text-decoration:underline;font-size:12px"></a>
    </div>
  </footer>
</div>

<div class="toast" id="toast" role="status"></div>

<script>
"use strict";
const $ = id => document.getElementById(id);

let LANG = localStorage.getItem(LANG_KEY) || "ar";
let THEME = localStorage.getItem(THEME_KEY) || "dark";

function applyTheme(){
  if(THEME === "light") document.documentElement.setAttribute("data-theme","light");
  else document.documentElement.removeAttribute("data-theme");
  $("themeBtn").textContent = THEME === "light"
    ? (LANG === "ar" ? "داكن" : "Dark")
    : (LANG === "ar" ? "فاتح" : "Light");
}
$("themeBtn").addEventListener("click", ()=>{
  THEME = THEME === "light" ? "dark" : "light";
  localStorage.setItem(THEME_KEY, THEME);
  applyTheme();
});
applyTheme();

const STAT_MIN_SHOW = 50;   // لا يظهر عدّاد العهود قبل هذا الرقم
const SUB_MIN_SHOW = 1;     // لا يظهر عدّاد المشتركين قبل هذا الرقم
let PACTS = null;
let SUBS = null;

async function rpcCall(name){
  try{
    const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${name}`,{
      method:"POST",
      headers:{ "apikey":SUPABASE_KEY, "Authorization":`Bearer ${SUPABASE_KEY}`, "Content-Type":"application/json" },
      body:"{}"
    });
    if(!r.ok) return null;
    return await r.json();
  }catch(e){ return null; }
}
function renderStat(){
  const c = $("statChip");
  if(typeof PACTS === "number" && PACTS >= STAT_MIN_SHOW){
    c.textContent = S().statChip(PACTS);
    c.style.display = "";
  } else c.style.display = "none";

  const sc = $("subsChip");
  if(typeof SUBS === "number" && SUBS >= SUB_MIN_SHOW){
    sc.textContent = S().subsChip(SUBS);
    sc.style.display = "";
  } else sc.style.display = "none";
}
async function loadStats(){
  const [pacts, subs] = await Promise.all([
    rpcCall("public_pact_count"),
    rpcCall("public_subscriber_count")
  ]);
  if(typeof pacts === "number") PACTS = pacts;
  if(typeof subs === "number") SUBS = subs;
  renderStat();
}

    return parts;
  }

const S = () => T[LANG];

/* ---------- helpers ---------- */
function clean(s){ return (s||"").toString().trim().replace(/\s+/g," "); }
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;"); }
function focusSoon(id){ setTimeout(()=>{ const el=$(id); if(el) el.focus(); }, 120); }
function truncate(s, n){ return s.length > n ? s.slice(0, n-1) + "…" : s; }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function copyText(text){
  try{
    if(navigator.clipboard && window.isSecureContext){
      await navigator.clipboard.writeText(text);
      return true;
    }
  }catch(e){}
  try{
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    const ok = document.execCommand("copy");
    ta.remove();
    return ok;
  }catch(e){ return false; }
}

function triggerDownload(href){
  const a = document.createElement("a");
  a.download = S().card.file;
  a.href = href;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

let toastTimer;
function toast(msg){
  const t = $("toast");
  t.textContent = msg; t.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.style.display = "none", 2400);
}

function showScene(id){
  currentScene = id;
  document.querySelectorAll(".scene").forEach(s=>s.classList.remove("active"));
  $(id).classList.add("active");
  window.scrollTo({top:0, behavior: REDUCED ? "auto" : "smooth"});
}

function renderQuestion(){
  const t = S();
  const q = t.questions[qIndex];
  $("vStep").textContent = t.step(qIndex);
  $("vVoice").textContent = q.voice;
  $("vErr").classList.remove("active");
  const area = $("vInputArea");

  if(qIndex === 0){
    area.innerHTML = `
      <label for="qDeferred">${q.label}</label>
      <input type="text" id="qDeferred" autocomplete="off" placeholder="${esc(q.ph)}" value="${esc(state.deferred)}" />
      <div class="hint">${q.hint}</div>`;
    focusSoon("qDeferred");
  }
  else if(qIndex === 1){
    area.innerHTML = `<div class="choices" role="radiogroup">` +
      t.fears.map(f=>`
        <button type="button" class="choice ${state.fear===f.id?"selected":""}" data-fear="${f.id}" role="radio" aria-checked="${state.fear===f.id}">
          ${f.label}<span class="c-sub">${f.sub}</span>
        </button>`).join("") + `</div>`;
    area.querySelectorAll(".choice").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        state.fear = btn.dataset.fear;
        area.querySelectorAll(".choice").forEach(b=>{
          b.classList.toggle("selected", b===btn);
          b.setAttribute("aria-checked", b===btn ? "true":"false");
        });
      });
    });
  }
  else if(qIndex === 2){
    area.innerHTML = `
      <label for="qPerson">${q.label}</label>
      <input type="text" id="qPerson" autocomplete="off" placeholder="${esc(q.ph)}" value="${esc(state.person)}" />
      <div class="hint">${q.hint}</div>`;
    focusSoon("qPerson");
  }
  else if(qIndex === 3){
    area.innerHTML = `
      <label for="qHours">${q.label}</label>
      <input type="number" id="qHours" min="0" max="16" step="0.5" placeholder="${esc(q.ph)}" value="${state.hours ?? ""}" />
      <div class="hint">${q.hint}</div>`;
    focusSoon("qHours");
  }
  else {
    area.innerHTML = `
      <label for="qScene">${q.label}</label>
      <textarea id="qScene" placeholder="${esc(q.ph)}">${esc(state.sceneDesc)}</textarea>
      <div class="hint">${q.hint}</div>`;
    focusSoon("qScene");
  }

  $("vBackBtn").style.display = qIndex > 0 ? "" : "none";
  $("vNextBtn").textContent = qIndex === 4 ? t.lastBtn : t.nextBtn;
  const p = Math.round(qIndex / 5 * 100);
  $("clarityFill").style.width = p + "%";
  $("clarityPct").textContent = pct(p);
}

function validateCurrent(){
  const q = S().questions[qIndex];
  if(qIndex === 0){
    const v = clean($("qDeferred").value);
    if(v.length < 2) return q.err;
    state.deferred = v;
  } else if(qIndex === 1){
    if(!state.fear) return q.err;
  } else if(qIndex === 2){
    const v = clean($("qPerson").value);
    if(v.length < 2) return q.err;
    state.person = v;
  } else if(qIndex === 3){
    const v = Number($("qHours").value);
    if($("qHours").value === "" || isNaN(v) || v < 0 || v > 16) return q.err;
    state.hours = v;
  } else {
    const v = clean($("qScene").value);
    if(v.length < 4) return q.err;
    state.sceneDesc = v;
  }
  return null;
}

$("vNextBtn").addEventListener("click", ()=>{
  const err = validateCurrent();
  if(err){ const e=$("vErr"); e.textContent = err; e.classList.add("active"); return; }
  if(qIndex < 4){ qIndex++; renderQuestion(); }
  else{
    $("clarityFill").style.width = "100%";
    $("clarityPct").textContent = pct(100);
    setTimeout(openLetter, REDUCED ? 0 : 500);
  }
});
$("vBackBtn").addEventListener("click", ()=>{ if(qIndex>0){ qIndex--; renderQuestion(); } });

$("startBtn").addEventListener("click", ()=>{
  $("envelope").classList.add("opened");
  setTimeout(()=>{ showScene("sceneVerify"); renderQuestion(); }, REDUCED ? 0 : 420);
});

function buildLetterParts(){
  const t = S();
  const totalHours = Math.round((state.hours||0) * 3650);
  const wakingYears = (state.hours||0) * 10 / 16;
  return t.letter(state, totalHours, t.wakingSpan(wakingYears));
}

let typing = false, skipRequested = false;

async function typeLetter(parts){
  const body = $("letterBody");
  body.innerHTML = "";
  typing = true; skipRequested = false;
  letterFinished = false;

  for(const part of parts){
    const p = document.createElement("p");
    body.appendChild(p);
    const caret = document.createElement("span");
    caret.className = "caret";
    p.appendChild(caret);

    if(REDUCED || skipRequested){
      caret.remove();
      p.textContent = part;
      continue;
    }
    let acc = "";
    for(const ch of part){
      if(skipRequested) break;
      acc += ch;
      p.textContent = acc;
      p.appendChild(caret);
      const pause = /[،؛.؟…!,;?\n]/.test(ch) ? 110 : 13;
      await sleep(pause);
    }
    caret.remove();
    p.textContent = part;
    if(!skipRequested) await sleep(260);
  }
  typing = false;
  finishLetter();
}

function renderFork(){
  const t = S().fork;
  const M = x => LANG === "en" ? 700 - x : x;
  const P = (x,y) => `${M(x)},${y}`;
  const dist = (a,b) => Math.hypot(a.x-b.x, a.y-b.y);

  // نقاط المسارين: اليوم ← +1 سنة ← +5 سنوات ← +10 سنوات
  const today = {x:660,y:130};
  const gold  = [ {x:580,y:118}, {x:320,y:78}, {x:60,y:42} ];
  const gray  = [ {x:580,y:140}, {x:320,y:132}, {x:60,y:150} ];
  const yearLbl = ["+1","+5","+10"];

  const goldSeg = [dist(today,gold[0]), dist(gold[0],gold[1]), dist(gold[1],gold[2])];
  const graySeg = [dist(today,gray[0]), dist(gray[0],gray[1]), dist(gray[1],gray[2])];
  const goldLen = goldSeg.reduce((a,b)=>a+b,0);
  const grayLen = graySeg.reduce((a,b)=>a+b,0);
  const goldFrac = [goldSeg[0]/goldLen, (goldSeg[0]+goldSeg[1])/goldLen, 1];
  const grayFrac = [graySeg[0]/grayLen, (graySeg[0]+graySeg[1])/grayLen, 1];

  const goldPath = `M${P(today.x,today.y)} L${P(gold[0].x,gold[0].y)} L${P(gold[1].x,gold[1].y)} L${P(gold[2].x,gold[2].y)}`;
  const grayPath = `M${P(today.x,today.y)} L${P(gray[0].x,gray[0].y)} L${P(gray[1].x,gray[1].y)} L${P(gray[2].x,gray[2].y)}`;

  // كل عنصر يظهر تدريجيًا: data-path يحدد أي مسار يتبع، data-frac متى يظهر على طول ذلك المسار
  let goldItems = "";
  gold.forEach((pt,i)=>{
    const r = i===2 ? 8 : 4;
    goldItems += `<circle class="fk-item" data-path="gold" data-frac="${goldFrac[i]}" cx="${M(pt.x)}" cy="${pt.y}" r="${r}" fill="#c9a227" opacity="0"/>`;
    if(i<2) goldItems += `<text class="fk-item" data-path="gold" data-frac="${goldFrac[i]}" x="${M(pt.x)}" y="${pt.y-12}" text-anchor="middle" font-size="10.5" font-weight="700" fill="#a9863f" opacity="0">${yearLbl[i]}</text>`;
  });
  let grayItems = "";
  gray.forEach((pt,i)=>{
    const r = i===2 ? 6 : 3;
    grayItems += i===2
      ? `<circle class="fk-item" data-path="gray" data-frac="${grayFrac[i]}" cx="${M(pt.x)}" cy="${pt.y}" r="${r}" fill="none" stroke="#9b9179" stroke-width="2" opacity="0"/>`
      : `<circle class="fk-item" data-path="gray" data-frac="${grayFrac[i]}" cx="${M(pt.x)}" cy="${pt.y}" r="${r}" fill="#c9c2ac" opacity="0"/>`;
  });

  $("forkSvg").innerHTML = `
    <circle class="fk-item" data-path="today" data-frac="0" cx="${M(today.x)}" cy="${today.y}" r="6" fill="#8a6712" opacity="0"/>
    <text class="fk-item" data-path="today" data-frac="0" x="${M(today.x)}" y="${today.y-16}" text-anchor="middle" font-size="12.5" font-weight="700" fill="#4a4132" opacity="0">${t.today}</text>
    <text class="fk-item" data-path="today" data-frac="0" x="${M(today.x)}" y="${today.y+22}" text-anchor="middle" font-size="10.5" fill="#8a8064" opacity="0">${fmtLong(now)}</text>

    <path id="fkGray" d="${grayPath}" fill="none" stroke="#9b9179" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"
      style="stroke-dasharray:${grayLen};stroke-dashoffset:${grayLen}" data-len="${grayLen}" opacity=".62"/>
    <path id="fkGold" d="${goldPath}" fill="none" stroke="#c9a227" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
      style="stroke-dasharray:${goldLen};stroke-dashoffset:${goldLen}" data-len="${goldLen}"/>
    ${goldItems}${grayItems}

    <text class="fk-item" data-path="gold" data-frac="1" x="${M(gold[2].x)}" y="${gold[2].y-22}" text-anchor="middle" font-size="13" font-weight="700" fill="#1f1910" opacity="0">${t.winTitle}</text>
    <text class="fk-item" data-path="gold" data-frac="1" x="${M(gold[2].x)}" y="${gold[2].y-6}" text-anchor="middle" font-size="11" fill="#8a6712" opacity="0">${esc(t.winLabel(truncate(state.deferred, 22)))}</text>

    <text class="fk-item" data-path="gray" data-frac="1" x="${M(gray[2].x)}" y="${gray[2].y+20}" text-anchor="middle" font-size="13" fill="#7a715c" opacity="0">${t.waitTitle}</text>
    <text class="fk-item" data-path="gray" data-frac="1" x="${M(gray[2].x)}" y="${gray[2].y+36}" text-anchor="middle" font-size="10.5" fill="#9b9179" opacity="0">${t.waitSub}</text>`;

  animateFork();
}

function revealForkPath(pathEl, durationMs){
  const len = Number(pathEl.dataset.len);
  pathEl.style.transition = "none";
  pathEl.style.strokeDashoffset = String(len);
  pathEl.getBoundingClientRect(); // إعادة تدفق إجبارية قبل بدء الانتقال
  requestAnimationFrame(()=>{
    pathEl.style.transition = `stroke-dashoffset ${durationMs}ms ease`;
    pathEl.style.strokeDashoffset = "0";
  });
}

function animateFork(){
  const svg = $("forkSvg");
  const todayItems = svg.querySelectorAll('[data-path="today"]');
  const goldItems = svg.querySelectorAll('[data-path="gold"]');
  const grayItems = svg.querySelectorAll('[data-path="gray"]');
  const goldPathEl = svg.querySelector("#fkGold");
  const grayPathEl = svg.querySelector("#fkGray");

  if(REDUCED){
    [...todayItems, ...goldItems, ...grayItems].forEach(el=> el.style.opacity = "1");
    [goldPathEl, grayPathEl].forEach(p=>{ p.style.transition="none"; p.style.strokeDashoffset="0"; });
    return;
  }

  const TODAY_FADE=300, GOLD_START=450, GOLD_MS=1500, GAP=300, GRAY_MS=1300;
  const GRAY_START = GOLD_START + GOLD_MS + GAP;

  todayItems.forEach(el=> el.style.transition = `opacity ${TODAY_FADE}ms ease`);
  requestAnimationFrame(()=> todayItems.forEach(el=> el.style.opacity = "1"));

  setTimeout(()=> revealForkPath(goldPathEl, GOLD_MS), GOLD_START);
  goldItems.forEach(el=>{
    el.style.transition = "opacity .3s ease";
    setTimeout(()=>{ el.style.opacity = "1"; }, GOLD_START + Number(el.dataset.frac) * GOLD_MS);
  });

  setTimeout(()=> revealForkPath(grayPathEl, GRAY_MS), GRAY_START);
  grayItems.forEach(el=>{
    el.style.transition = "opacity .3s ease";
    setTimeout(()=>{ el.style.opacity = "1"; }, GRAY_START + Number(el.dataset.frac) * GRAY_MS);
  });
}

function finishLetter(){
  const t = S();
  letterFinished = true;
  $("skipBtn").style.display = "none";
  $("letterSig").style.display = "";
  $("sigDate").textContent = t.sigDate(fmtLong(future), fmtLong(now));
  renderFork();
  $("letterPS").style.display = "";
  $("letterActions").style.display = "flex";
}

function openLetter(instant){
  const t = S();
  $("letterFrom").textContent = t.letterFrom(fmtLong(future));
  showScene("sceneLetter");
  if(instant){
    const body = $("letterBody");
    body.innerHTML = "";
    for(const part of buildLetterParts()){
      const p = document.createElement("p");
      p.textContent = part;
      body.appendChild(p);
    }
    finishLetter();
    return;
  }
  $("skipBtn").style.display = "";
  $("letterSig").style.display = "none";
  $("letterPS").style.display = "none";
  $("letterActions").style.display = "none";
  typeLetter(buildLetterParts());
}

/* =====================================================
   PACT CARD
===================================================== */
function wrapText(ctx, text, maxWidth){
  const words = text.split(" ");
  const lines = [];
  let line = "";
  for(const w of words){
    const test = line ? line + " " + w : w;
    if(ctx.measureText(test).width > maxWidth && line){ lines.push(line); line = w; }
    else line = test;
  }
  if(line) lines.push(line);
  return lines;
}

async function drawPactCard(promise, madeDate, dueDate){
  const t = S().card;
  const cv = $("pactCanvas"), ctx = cv.getContext("2d");
  const W = cv.width, H = cv.height;

  try{
    await Promise.all([
      document.fonts.load('700 64px "Amiri"'),
      document.fonts.load('400 52px "Amiri"'),
      document.fonts.load('700 30px "Tajawal"')
    ]);
  }catch(e){}

  ctx.direction = LANG === "ar" ? "rtl" : "ltr";
  ctx.textAlign = "center";

  ctx.fillStyle = "#0c0f16"; ctx.fillRect(0,0,W,H);
  const glow = ctx.createRadialGradient(W/2, -100, 50, W/2, -100, 900);
  glow.addColorStop(0, "rgba(201,162,39,.16)");
  glow.addColorStop(1, "rgba(201,162,39,0)");
  ctx.fillStyle = glow; ctx.fillRect(0,0,W,H);

  ctx.strokeStyle = "#c9a227"; ctx.lineWidth = 3;
  ctx.strokeRect(44,44,W-88,H-88);
  ctx.strokeStyle = "rgba(201,162,39,.4)"; ctx.lineWidth = 1.5;
  ctx.strokeRect(62,62,W-124,H-124);

  ctx.fillStyle = "#e3c565";
  ctx.font = '700 40px "Tajawal"';
  ctx.fillText(t.header, W/2, 170);
  ctx.fillStyle = "#f3ead7";
  ctx.font = '700 112px "Amiri"';
  ctx.fillText(t.title, W/2, 320);

  ctx.strokeStyle = "rgba(201,162,39,.55)"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W/2-140, 370); ctx.lineTo(W/2+140, 370); ctx.stroke();
  ctx.fillStyle = "#c9a227";
  ctx.beginPath(); ctx.arc(W/2, 370, 7, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = "#eef1f8";
  ctx.font = '400 58px "Amiri"';
  const q1 = LANG === "ar" ? "« " : "\u201C ";
  const q2 = LANG === "ar" ? " »" : " \u201D";
  const lines = wrapText(ctx, q1 + promise + q2, W-260);
  const lh = 96;
  let y = Math.max(500, (H/2) - (lines.length*lh)/2 + 40);
  for(const ln of lines){ ctx.fillText(ln, W/2, y); y += lh; }

  ctx.font = '700 32px "Tajawal"';
  ctx.fillStyle = "#98a1b3";
  ctx.fillText(t.made(madeDate), W/2, H-260);
  ctx.fillStyle = "#e3c565";
  ctx.fillText(t.due(dueDate), W/2, H-200);

  const sx = W/2, sy = H-118;
  const seal = ctx.createRadialGradient(sx-8, sy-8, 4, sx, sy, 34);
  seal.addColorStop(0, "#efd88a"); seal.addColorStop(.5, "#c9a227"); seal.addColorStop(1, "#7a621a");
  ctx.fillStyle = seal;
  ctx.beginPath(); ctx.arc(sx, sy, 32, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#241c05";
  ctx.font = '700 24px "Amiri"';
  ctx.fillText(t.seal, sx, sy+9);
}

$("sealPactBtn").addEventListener("click", async ()=>{
  const promise = clean($("pactInput").value);
  if(promise.length < 4){ $("pactErr").classList.add("active"); return; }
  $("pactErr").classList.remove("active");

  await drawPactCard(promise, fmtLong(now), fmtLong(future));
  $("cardPreview").classList.add("active");
  $("cardPreview").scrollIntoView({behavior: REDUCED ? "auto":"smooth", block:"start"});

  try{ localStorage.setItem(PACT_KEY, JSON.stringify({ text: promise, date: now.toISOString() })); }catch(e){}
  rpcCall("bump_pact_counter").then(n=>{ if(typeof n === "number"){ PACTS = n; renderStat(); } });
  refreshRibbon();
  toast(S().toastSealed);
});

$("downloadCardBtn").addEventListener("click", ()=>{
  const cv = $("pactCanvas");
  cv.toBlob(blob=>{
    if(!blob){ triggerDownload(cv.toDataURL("image/png")); return; }
    const url = URL.createObjectURL(blob);
    triggerDownload(url);
    setTimeout(()=> URL.revokeObjectURL(url), 4000);
  }, "image/png");
});

$("shareCardBtn").addEventListener("click", ()=>{
  const t = S();
  $("pactCanvas").toBlob(async blob=>{
    const file = blob ? new File([blob], "pact-card.png", {type:"image/png"}) : null;
    const base = { title:t.shareTitle, text:t.shareText, url: location.href };
    try{
      if(file && navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({ ...base, files:[file] });
        return;
      }
      if(navigator.share){ await navigator.share(base); return; }
    }catch(e){
      if(e && e.name === "AbortError") return;
    }
    const ok = await copyText(location.href);
    toast(ok ? t.toastShareFallback : t.toastShareFail);
  }, "image/png");
});

/* =====================================================
   RESTART + RETURN VISIT + LANGUAGE
===================================================== */
function restartAll(){
  qIndex = 0;
  state.deferred = ""; state.fear = ""; state.person = "";
  state.hours = null; state.sceneDesc = "";
  letterFinished = false;
  $("pactInput").value = "";
  $("cardPreview").classList.remove("active");
  $("envelope").classList.remove("opened");
  showScene("sceneIntro");
}
$("restartBtn").addEventListener("click", restartAll);

function loadPact(){
  try{ return JSON.parse(localStorage.getItem(PACT_KEY) || "null"); }catch(e){ return null; }
}

function refreshRibbon(){
  const t = S();
  const saved = loadPact();
  if(!saved || !saved.text){ $("pactRibbon").classList.remove("active"); return; }
  const made = new Date(saved.date);
  const days = Math.max(0, Math.floor((now - made) / 86400000));
  $("prTitle").textContent = t.prTitle(t.days(days));
  $("prText").textContent = LANG === "ar" ? `«${saved.text}»` : `\u201C${saved.text}\u201D`;
  $("pactRibbon").classList.add("active");
}

$("prViewBtn").addEventListener("click", async ()=>{
  const saved = loadPact();
  if(!saved) return;
  const made = new Date(saved.date);
  const due = new Date(made); due.setFullYear(made.getFullYear()+10);
  await drawPactCard(saved.text, fmtLong(made), fmtLong(due));
  showScene("scenePact");
  $("pactInput").value = saved.text;
  $("cardPreview").classList.add("active");
  setTimeout(()=> $("cardPreview").scrollIntoView({behavior: REDUCED ? "auto":"smooth"}), 80);
});
$("prResetBtn").addEventListener("click", ()=>{
  try{ localStorage.removeItem(PACT_KEY); }catch(e){}
  $("pactRibbon").classList.remove("active");
  restartAll();
});

$("langBtn").addEventListener("click", async ()=>{
  LANG = LANG === "ar" ? "en" : "ar";
  localStorage.setItem(LANG_KEY, LANG);
  skipRequested = true;
  applyStatic();
  applyTheme();
  refreshRibbon();

  if(currentScene === "sceneVerify"){
    renderQuestion();
  } else if(currentScene === "sceneLetter"){
    await sleep(60);
    openLetter(true);
  } else if(currentScene === "scenePact"){
    if($("cardPreview").classList.contains("active")){
      const promise = clean($("pactInput").value);
      if(promise) await drawPactCard(promise, fmtLong(now), fmtLong(future));
    }
  }
});

/* ---------- init ---------- */
applyStatic();
refreshRibbon();
loadStats();
